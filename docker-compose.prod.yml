version: '3.8'

services:
  app:
    image: csedu-app:latest
    container_name: csedu-portal
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - csedu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  csedu-network:
    driver: bridge
