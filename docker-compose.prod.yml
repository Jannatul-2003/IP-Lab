version: '3.8'

services:
  app:
    image: csedu-app:latest
    container_name: csedu-portal
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - csedu-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  csedu-network:
    driver: bridge
