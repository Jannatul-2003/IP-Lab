version: '3.8'

services:
  # Main Application (Next.js with Node backend)
  app:
    image: csedu-app:latest
    container_name: csedu-portal
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8000:8000"
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0
      
      # Database
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      
      # JWT
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      
      # API Configuration
      - API_URL=${API_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      
      # Session
      - SESSION_SECRET=${SESSION_SECRET}
      
      # SSLCommerz
      - SSLCOMMERZ_STORE_ID=${SSLCOMMERZ_STORE_ID}
      - SSLCOMMERZ_STORE_PASSWORD=${SSLCOMMERZ_STORE_PASSWORD}
      
      # Email
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      
      # Storage
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    
    # Volume mounts
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Network
    networks:
      - csedu-network
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=csedu-portal"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Reverse Proxy (Nginx)
  nginx:
    image: nginx:1.25-alpine
    container_name: csedu-nginx
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "80:80"
      - "443:443"
    
    # Volume mounts
    volumes:
      # Nginx configuration
      - ./nginx/csedu:/etc/nginx/sites-available/default:ro
      
      # SSL certificates
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:rw
      
      # Static files (optional)
      - ./public:/var/www/html:ro
      
      # Logs
      - ./logs/nginx:/var/log/nginx
    
    # Network
    networks:
      - csedu-network
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=csedu-nginx"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    depends_on:
      - app

  # Optional: Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: csedu-redis
    restart: unless-stopped
    
    # Port mapping (only for local development)
    # ports:
    #   - "6379:6379"
    
    # Volume for persistence
    volumes:
      - redis-data:/data
    
    # Commands
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    
    # Network
    networks:
      - csedu-network
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Backup service (runs daily)
  backup:
    image: csedu-app:latest
    container_name: csedu-backup
    restart: unless-stopped
    
    environment:
      - DATABASE_URL=${DATABASE_URL}
    
    # Volume for backups
    volumes:
      - ./backups:/app/backups
    
    # Run backup script daily at 2 AM
    # This is a placeholder - you'd need to create a backup script
    command: sh -c 'while true; do sleep 86400; pg_dump $DATABASE_URL | gzip > /app/backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz; done'
    
    networks:
      - csedu-network
    
    # Don't auto-restart if it fails
    restart: on-failure:3

# Named volumes
volumes:
  redis-data:
    driver: local

# Networks
networks:
  csedu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
